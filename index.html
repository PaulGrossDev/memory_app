<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory – Spiel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400&family=Red+Rose:wght@400;700&family=Orbitron:wght@700&family=Figtree:wght@400;700&family=Delius+Unicase:wght@700&family=Klee+One:wght@600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Startseite / Homescreen -->
        <section id="home" class="page page--visible">
            <img src="/assets/icons/controller-bg.svg" alt="" class="home__controller-bg" aria-hidden="true">
            <div class="home__text">
                <p class="home__subtitle">It's play time.</p>
                <h1 class="home__title">Ready to play?</h1>
            </div>
            <button type="button" id="btn-start" class="btn btn--play">
                <img src="/assets/icons/controller.svg" alt="" class="btn__icon btn__icon--controller" width="44" height="32">
                <span class="btn__text">Play</span>
                <img src="/assets/icons/arrow.svg" alt="" class="btn__icon btn__icon--arrow" width="35" height="15">
            </button>
        </section>

        <!-- Einstellungen -->
        <section id="settings" class="page settings">
            <div class="settings__wrapper">
                <header class="settings__header">
                    <div class="settings__header-inner">
                        <h2 class="settings__title">Settings</h2>
                        <img src="/assets/icons/underline.svg" alt="" class="settings__underline" aria-hidden="true">
                    </div>
                </header>
                <div class="settings__layout">
                <!-- Linke Spalte: Auswahloptionen -->
                <div class="settings__options">
                    <div class="settings__group">
                        <h3 class="settings__group-title">
                            <img src="/assets/icons/game.svg" alt="" class="settings__icon settings__icon--game" width="27" height="27">
                            Game themes
                        </h3>
                        <div class="settings__radios" id="settings-themes">
                            <label class="settings__radio">
                                <input type="radio" name="theme" value="code-vibes" checked>
                                <span class="settings__radio-circle" aria-hidden="true"></span>
                                <span class="settings__radio-label">
                                    <span class="settings__radio-text">Code vibes theme</span>
                                    <img src="/assets/icons/line.svg" alt="" class="settings__radio-line" aria-hidden="true">
                                </span>
                            </label>
                            <label class="settings__radio">
                                <input type="radio" name="theme" value="gaming">
                                <span class="settings__radio-circle" aria-hidden="true"></span>
                                <span class="settings__radio-label">
                                    <span class="settings__radio-text">Gaming theme</span>
                                    <img src="/assets/icons/line.svg" alt="" class="settings__radio-line" aria-hidden="true">
                                </span>
                            </label>
                            <label class="settings__radio">
                                <input type="radio" name="theme" value="da-projects">
                                <span class="settings__radio-circle" aria-hidden="true"></span>
                                <span class="settings__radio-label">
                                    <span class="settings__radio-text">DA Projects theme</span>
                                    <img src="/assets/icons/line.svg" alt="" class="settings__radio-line" aria-hidden="true">
                                </span>
                            </label>
                            <label class="settings__radio">
                                <input type="radio" name="theme" value="foods">
                                <span class="settings__radio-circle" aria-hidden="true"></span>
                                <span class="settings__radio-label">
                                    <span class="settings__radio-text">Foods theme</span>
                                    <img src="/assets/icons/line.svg" alt="" class="settings__radio-line" aria-hidden="true">
                                </span>
                            </label>
                        </div>
                    </div>

                    <div class="settings__group">
                        <h3 class="settings__group-title">
                            <img src="/assets/icons/player.svg" alt="" class="settings__icon settings__icon--player" width="22" height="27">
                            Choose player
                        </h3>
                        <div class="settings__radios" id="settings-player">
                            <label class="settings__radio">
                                <input type="radio" name="player" value="blue" checked>
                                <span class="settings__radio-circle" aria-hidden="true"></span>
                                <span class="settings__radio-label">
                                    <span class="settings__radio-text">Blue</span>
                                    <img src="/assets/icons/line.svg" alt="" class="settings__radio-line" aria-hidden="true">
                                </span>
                            </label>
                            <label class="settings__radio">
                                <input type="radio" name="player" value="orange">
                                <span class="settings__radio-circle" aria-hidden="true"></span>
                                <span class="settings__radio-label">
                                    <span class="settings__radio-text">Orange</span>
                                    <img src="/assets/icons/line.svg" alt="" class="settings__radio-line" aria-hidden="true">
                                </span>
                            </label>
                        </div>
                    </div>

                    <div class="settings__group">
                        <h3 class="settings__group-title">
                            <img src="/assets/icons/board.svg" alt="" class="settings__icon settings__icon--board" width="27" height="26">
                            Board size
                        </h3>
                        <div class="settings__radios" id="settings-board">
                            <label class="settings__radio">
                                <input type="radio" name="board" value="16" checked>
                                <span class="settings__radio-circle" aria-hidden="true"></span>
                                <span class="settings__radio-label">
                                    <span class="settings__radio-text">16 cards</span>
                                    <img src="/assets/icons/line.svg" alt="" class="settings__radio-line" aria-hidden="true">
                                </span>
                            </label>
                            <label class="settings__radio">
                                <input type="radio" name="board" value="24">
                                <span class="settings__radio-circle" aria-hidden="true"></span>
                                <span class="settings__radio-label">
                                    <span class="settings__radio-text">24 cards</span>
                                    <img src="/assets/icons/line.svg" alt="" class="settings__radio-line" aria-hidden="true">
                                </span>
                            </label>
                            <label class="settings__radio">
                                <input type="radio" name="board" value="36">
                                <span class="settings__radio-circle" aria-hidden="true"></span>
                                <span class="settings__radio-label">
                                    <span class="settings__radio-text">36 cards</span>
                                    <img src="/assets/icons/line.svg" alt="" class="settings__radio-line" aria-hidden="true">
                                </span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Rechte Spalte: Theme-Vorschau -->
                <div class="settings__preview-column">
                    <div class="settings__preview" id="settings-preview">
                        <div class="settings__preview-inner">
                            <div class="settings__preview-pane settings__preview-pane--active" data-theme="code-vibes">
                                <img src="/assets/theme_visual/code-vibes-theme.svg" alt="Code vibes Theme Vorschau" class="settings__preview-img">
                            </div>
                            <div class="settings__preview-pane" data-theme="gaming">
                                <img src="/assets/theme_visual/gaming-theme.svg" alt="Gaming Theme Vorschau" class="settings__preview-img">
                            </div>
                            <div class="settings__preview-pane" data-theme="da-projects">
                                <img src="/assets/theme_visual/da-projects-theme.svg" alt="DA Projects Theme Vorschau" class="settings__preview-img">
                            </div>
                            <div class="settings__preview-pane" data-theme="foods">
                                <img src="/assets/theme_visual/foods-theme.svg" alt="Foods Theme Vorschau" class="settings__preview-img">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Start-Bar: unten rechts im Layout -->
                <div class="settings__start-bar">
                    <span class="settings__start-summary">
                        <span class="settings__start-item" id="start-theme">Code vibes theme</span>
                        <img src="/assets/icons/d-line.svg" alt="" class="settings__start-slash" aria-hidden="true">
                        <span class="settings__start-item" id="start-player">Blue</span>
                        <img src="/assets/icons/d-line.svg" alt="" class="settings__start-slash" aria-hidden="true">
                        <span class="settings__start-item" id="start-board">16 cards</span>
                    </span>
                    <button type="button" id="btn-start-game" class="settings__start-btn">
                        <img src="/assets/icons/start.svg" alt="" class="settings__start-btn-icon" aria-hidden="true">
                        <span class="settings__start-btn-text">Start</span>
                    </button>
                </div>
            </div>
            </div>
        </section>

        <!-- Spielansicht -->
        <section id="game" class="page">
            <div class="game__header">
                <div class="game__score" id="game-score">
                    <div class="game__score-item game__score-item--blue">
                        <img src="/assets/icons/label-blue.svg" alt="" class="game__score-icon game__score-icon--blue" aria-hidden="true">
                        <span class="game__score-label">Blue</span>
                        <span class="game__score-value" id="score-blue">0</span>
                    </div>
                    <div class="game__score-item game__score-item--orange">
                        <img src="/assets/icons/label-orange.svg" alt="" class="game__score-icon game__score-icon--orange" aria-hidden="true">
                        <span class="game__score-label">Orange</span>
                        <span class="game__score-value" id="score-orange">0</span>
                    </div>
                </div>
                <span class="game__player-row">
                    <span class="game__player" id="game-current-player">Current player:</span>
                    <span class="game__player-indicator" id="game-player-indicator">
                        <img src="/assets/icons/label-blue.svg" alt="" class="game__player-icon" aria-hidden="true">
                    </span>
                </span>
                <button type="button" id="btn-exit-game" class="game__exit-btn">
                    <span class="game__exit-icon-wrapper">
                        <img src="/assets/themes/code-vibes/icons/exit.svg" alt="" class="game__exit-icon game__exit-icon--default" width="26" height="23" aria-hidden="true">
                        <img src="/assets/themes/code-vibes/icons/exit.svg" alt="" class="game__exit-icon game__exit-icon--hover" width="26" height="23" aria-hidden="true">
                    </span>
                    <span class="game__exit-text">Exit Game</span>
                </button>
            </div>
            <div id="game-board" class="game__board">
                <!-- Spielfeld wird dynamisch befüllt -->
            </div>

            <!-- Exit-Bestätigungs-Modal -->
            <div id="exit-confirm-modal" class="exit-confirm" aria-hidden="true">
                <div class="exit-confirm__backdrop"></div>
                <div class="exit-confirm__dialog">
                    <p class="exit-confirm__text">Are you sure you want to quit the game?</p>
                    <div class="exit-confirm__actions">
                        <button type="button" id="btn-exit-cancel" class="exit-confirm__btn exit-confirm__btn--cancel">No, back to Game</button>
                        <button type="button" id="btn-exit-confirm" class="exit-confirm__btn exit-confirm__btn--confirm">Exit Game</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Spielende -->
        <section id="game-over" class="page game-over">
            <div class="game-over__top">
                <div id="game-over-title" class="game-over__title"></div>
                <div class="game-over__final-section">
                <p id="game-over-final-score" class="game-over__final-score">Final score</p>
                <div class="game__score" id="game-over-score">
                    <div class="game__score-item game__score-item--blue">
                        <img src="/assets/icons/label-blue.svg" alt="" class="game__score-icon game__score-icon--blue" aria-hidden="true">
                        <span class="game__score-label">Blue</span>
                        <span class="game__score-value" id="game-over-score-blue">0</span>
                    </div>
                    <div class="game__score-item game__score-item--orange">
                        <img src="/assets/icons/label-orange.svg" alt="" class="game__score-icon game__score-icon--orange" aria-hidden="true">
                        <span class="game__score-label">Orange</span>
                        <span class="game__score-value" id="game-over-score-orange">0</span>
                    </div>
                </div>
                </div>
            </div>
        </section>

        <!-- Gewinner-Anzeige -->
        <section id="winner" class="page winner">
            <div class="winner__content" id="winner-content">
                <div class="winner__top">
                    <p class="winner__intro" id="winner-intro">The winner is</p>
                    <h2 class="winner__title" id="winner-title">Blue Player</h2>
                </div>
                <div class="winner__icon-wrap">
                    <img id="winner-icon" class="winner__icon" src="/assets/icons/figure-blue.svg" alt="" width="200" height="200" aria-hidden="true">
                </div>
                <button type="button" id="btn-home" class="winner__btn-home">Back to start</button>
            </div>
        </section>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>

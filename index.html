<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory – Spiel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400&family=Red+Rose:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Startseite / Homescreen -->
        <section id="home" class="page page--visible">
            <img src="/assets/controller-bg.svg" alt="" class="home__controller-bg" aria-hidden="true">
            <div class="home__text">
                <p class="home__subtitle">It's play time.</p>
                <h1 class="home__title">Ready to play?</h1>
            </div>
            <button type="button" id="btn-start" class="btn btn--play">
                <img src="/assets/controller.svg" alt="" class="btn__icon btn__icon--controller" width="44" height="32">
                <span class="btn__text">Play</span>
                <img src="/assets/arrow.svg" alt="" class="btn__icon btn__icon--arrow" width="35" height="15">
            </button>
        </section>

        <!-- Einstellungen -->
        <section id="settings" class="page settings">
            <div class="settings__wrapper">
                <header class="settings__header">
                    <div class="settings__header-inner">
                        <h2 class="settings__title">Settings</h2>
                        <img src="/assets/icons/underline.svg" alt="" class="settings__underline" aria-hidden="true">
                    </div>
                </header>
                <div class="settings__layout">
                <!-- Linke Spalte: Auswahloptionen -->
                <div class="settings__options">
                    <div class="settings__group">
                        <h3 class="settings__group-title">
                            <img src="/assets/icons/game.svg" alt="" class="settings__icon settings__icon--game" width="27" height="27">
                            Game themes
                        </h3>
                        <div class="settings__radios" id="settings-themes">
                            <label class="settings__radio">
                                <input type="radio" name="theme" value="code-vibes" checked>
                                <span class="settings__radio-circle" aria-hidden="true"></span>
                                <span class="settings__radio-label">
                                    <span class="settings__radio-text">Code vibes theme</span>
                                    <img src="/assets/icons/line.svg" alt="" class="settings__radio-line" aria-hidden="true">
                                </span>
                            </label>
                            <label class="settings__radio">
                                <input type="radio" name="theme" value="gaming">
                                <span class="settings__radio-circle" aria-hidden="true"></span>
                                <span class="settings__radio-label">
                                    <span class="settings__radio-text">Gaming theme</span>
                                    <img src="/assets/icons/line.svg" alt="" class="settings__radio-line" aria-hidden="true">
                                </span>
                            </label>
                            <label class="settings__radio">
                                <input type="radio" name="theme" value="da-projects">
                                <span class="settings__radio-circle" aria-hidden="true"></span>
                                <span class="settings__radio-label">
                                    <span class="settings__radio-text">DA Projects theme</span>
                                    <img src="/assets/icons/line.svg" alt="" class="settings__radio-line" aria-hidden="true">
                                </span>
                            </label>
                            <label class="settings__radio">
                                <input type="radio" name="theme" value="foods">
                                <span class="settings__radio-circle" aria-hidden="true"></span>
                                <span class="settings__radio-label">
                                    <span class="settings__radio-text">Foods theme</span>
                                    <img src="/assets/icons/line.svg" alt="" class="settings__radio-line" aria-hidden="true">
                                </span>
                            </label>
                        </div>
                    </div>

                    <div class="settings__group">
                        <h3 class="settings__group-title">
                            <img src="/assets/icons/player.svg" alt="" class="settings__icon settings__icon--player" width="22" height="27">
                            Choose player
                        </h3>
                        <div class="settings__radios" id="settings-player">
                            <label class="settings__radio">
                                <input type="radio" name="player" value="blue" checked>
                                <span class="settings__radio-circle" aria-hidden="true"></span>
                                <span class="settings__radio-label">
                                    <span class="settings__radio-text">Blue</span>
                                    <img src="/assets/icons/line.svg" alt="" class="settings__radio-line" aria-hidden="true">
                                </span>
                            </label>
                            <label class="settings__radio">
                                <input type="radio" name="player" value="orange">
                                <span class="settings__radio-circle" aria-hidden="true"></span>
                                <span class="settings__radio-label">
                                    <span class="settings__radio-text">Orange</span>
                                    <img src="/assets/icons/line.svg" alt="" class="settings__radio-line" aria-hidden="true">
                                </span>
                            </label>
                        </div>
                    </div>

                    <div class="settings__group">
                        <h3 class="settings__group-title">
                            <img src="/assets/icons/board.svg" alt="" class="settings__icon settings__icon--board" width="27" height="26">
                            Board size
                        </h3>
                        <div class="settings__radios" id="settings-board">
                            <label class="settings__radio">
                                <input type="radio" name="board" value="16" checked>
                                <span class="settings__radio-circle" aria-hidden="true"></span>
                                <span class="settings__radio-label">
                                    <span class="settings__radio-text">16 cards</span>
                                    <img src="/assets/icons/line.svg" alt="" class="settings__radio-line" aria-hidden="true">
                                </span>
                            </label>
                            <label class="settings__radio">
                                <input type="radio" name="board" value="24">
                                <span class="settings__radio-circle" aria-hidden="true"></span>
                                <span class="settings__radio-label">
                                    <span class="settings__radio-text">24 cards</span>
                                    <img src="/assets/icons/line.svg" alt="" class="settings__radio-line" aria-hidden="true">
                                </span>
                            </label>
                            <label class="settings__radio">
                                <input type="radio" name="board" value="36">
                                <span class="settings__radio-circle" aria-hidden="true"></span>
                                <span class="settings__radio-label">
                                    <span class="settings__radio-text">36 cards</span>
                                    <img src="/assets/icons/line.svg" alt="" class="settings__radio-line" aria-hidden="true">
                                </span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Rechte Spalte: Theme-Vorschau -->
                <div class="settings__preview-column">
                    <div class="settings__preview" id="settings-preview">
                        <div class="settings__preview-inner">
                            <div class="settings__preview-pane settings__preview-pane--active" data-theme="code-vibes">
                                <img src="/assets/theme_visual/code-vibes-theme.svg" alt="Code vibes Theme Vorschau" class="settings__preview-img">
                            </div>
                            <div class="settings__preview-pane" data-theme="gaming">
                                <img src="/assets/theme_visual/gaming-theme.svg" alt="Gaming Theme Vorschau" class="settings__preview-img">
                            </div>
                            <div class="settings__preview-pane" data-theme="da-projects">
                                <img src="/assets/theme_visual/da-projects-theme.svg" alt="DA Projects Theme Vorschau" class="settings__preview-img">
                            </div>
                            <div class="settings__preview-pane" data-theme="foods">
                                <img src="/assets/theme_visual/foods-theme.svg" alt="Foods Theme Vorschau" class="settings__preview-img">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Start-Bar: unten rechts im Layout -->
                <div class="settings__start-bar">
                    <span class="settings__start-summary">
                        <span class="settings__start-item" id="start-theme">Code vibes theme</span>
                        <img src="/assets/icons/d-line.svg" alt="" class="settings__start-slash" aria-hidden="true">
                        <span class="settings__start-item" id="start-player">Blue</span>
                        <img src="/assets/icons/d-line.svg" alt="" class="settings__start-slash" aria-hidden="true">
                        <span class="settings__start-item" id="start-board">16 cards</span>
                    </span>
                    <button type="button" id="btn-start-game" class="settings__start-btn">
                        <img src="/assets/icons/start.svg" alt="" class="settings__start-btn-icon" aria-hidden="true">
                        <span class="settings__start-btn-text">Start</span>
                    </button>
                </div>
            </div>
            </div>
        </section>

        <!-- Spielansicht -->
        <section id="game" class="page">
            <div class="game__header">
                <span class="game__score">Punkte: 0 – 0</span>
                <span class="game__player">Spieler 1</span>
                <button type="button" id="btn-exit-game" class="btn btn--secondary">
                    Exit Game
                </button>
            </div>
            <div id="game-board" class="game__board">
                <!-- Spielfeld wird dynamisch befüllt -->
            </div>
        </section>

        <!-- Spielende -->
        <section id="game-over" class="page">
            <h2>Game Over</h2>
            <p class="game-over__winner">Gewinner: –</p>
            <p class="game-over__score">Punktestand: 0 – 0</p>
            <button type="button" id="btn-home" class="btn btn--primary">
                Zur Startseite
            </button>
        </section>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
